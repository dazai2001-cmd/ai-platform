name: Release container images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Run the complete CI gate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  publish:
    name: Publish ${{ matrix.name }} image
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: ./Dockerfile
            extra_build_args: ""
          - name: frontend
            context: ./frontend/nextjs-app
            dockerfile: ./frontend/nextjs-app/Dockerfile
            extra_build_args: |
              NEXT_PUBLIC_API_URL=
              NEXT_PUBLIC_AUTH_REQUIRED=true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=raw,value=sha-${{ github.sha }}

      - name: Build native image for security scanning
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ai-platform-scan:${{ matrix.name }}-${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
            ${{ matrix.extra_build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Scan image and produce SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ai-platform-scan:${{ matrix.name }}-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload vulnerability report
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: container-${{ matrix.name }}

      - name: Block release on fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ai-platform-scan:${{ matrix.name }}-${{ github.sha }}
          format: table
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          skip-setup-trivy: true

      - name: Build and publish multi-architecture image
        id: publish
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
            ${{ matrix.extra_build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: mode=max
          sbom: true

      - name: Summarize published digest
        run: |
          echo "### ${{ matrix.name }} image" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${{ github.repository }}-${{ matrix.name }}@${{ steps.publish.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  promote:
    name: Promote the verified image pair
    needs: publish
    if: github.ref_name == 'main' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote immutable manifests to release tags
        shell: bash
        run: |
          set -euo pipefail
          targets=()

          if [[ "$GITHUB_REF_TYPE" == "branch" && "$GITHUB_REF_NAME" == "main" ]]; then
            targets+=("latest")
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Refusing to promote non-semantic tag: $GITHUB_REF_NAME" >&2
              exit 1
            fi
            targets+=("$GITHUB_REF_NAME" "$version")
            if [[ "$version" != *-* ]]; then
              targets+=("${version%.*}" "latest")
            fi
          fi

          for component in api frontend; do
            image="ghcr.io/${GITHUB_REPOSITORY}-${component}"
            source="${image}:sha-${GITHUB_SHA}"
            args=()
            for tag in "${targets[@]}"; do
              args+=(--tag "${image}:${tag}")
            done
            docker buildx imagetools create "${args[@]}" "$source"
          done
