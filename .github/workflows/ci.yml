name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript ocrmypdf tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run backend tests
        env:
          DEBUG: "false"
          SECRET_KEY: ci-secret
          OLLAMA_BASE_URL: http://127.0.0.1:11434
          REDIS_URL: redis://127.0.0.1:6379
          OPENAI_COMPAT_API_KEY: ""
          ADZUNA_APP_ID: ""
          ADZUNA_APP_KEY: ""
          REED_API_KEY: ""
        run: python -m pytest -q

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/nextjs-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/nextjs-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

  docker:
    name: Docker config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config

      - name: Build API image
        run: docker build -t ai-platform-api:ci .
