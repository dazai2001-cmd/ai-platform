name: CI

on:
  workflow_call:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

concurrency:
  # A release calls this workflow as a reusable CI gate while the normal push
  # run may also be active. Include the caller workflow name so they do not
  # cancel each other.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_platform_test
          POSTGRES_USER: ai_platform
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_platform -d ai_platform_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript ocrmypdf tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        env:
          DEBUG: "false"
          SECRET_KEY: ci-secret
          OLLAMA_BASE_URL: http://127.0.0.1:11434
          REDIS_URL: redis://127.0.0.1:6379
          OPENAI_COMPAT_API_KEY: ""
          ADZUNA_APP_ID: ""
          ADZUNA_APP_KEY: ""
          REED_API_KEY: ""
          TEST_POSTGRES_URL: postgresql://ai_platform:ci-postgres-password@127.0.0.1:5432/ai_platform_test
        run: python -m pytest -q --cov=agents --cov=application --cov=apps --cov=core --cov=domain --cov=infrastructure --cov=services --cov-report=term-missing --cov-report=xml --cov-fail-under=52

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/nextjs-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/nextjs-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/nextjs-app/coverage

  docker:
    name: Docker config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate development Compose file
        run: docker compose config

      - name: Validate production Compose file
        env:
          SECRET_KEY: ci-only-secret-value-that-is-at-least-32-characters
          RESEND_API_KEY: ci-only-resend-key
          APP_PUBLIC_URL: https://ai.example.test
          CORS_ORIGINS: https://ai.example.test
          DATABASE_URL: postgresql://ci:ci@db.example.test:5432/postgres
        run: docker compose -f docker-compose.prod.yml config

      - name: Build API image
        run: docker build -t ai-platform-api:ci .

      - name: Build frontend image
        run: docker build -t ai-platform-frontend:ci frontend/nextjs-app
