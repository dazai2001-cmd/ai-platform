services:
  api:
    build: .
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - APP_ENV=development
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - AI_RUNTIME=${AI_RUNTIME:-local}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODELS=${GEMINI_MODELS:-gemini-3.5-flash}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODELS=${OPENROUTER_MODELS:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - EMBED_MODEL=${EMBED_MODEL:-all-MiniLM-L6-v2}
      - GEMINI_EMBED_MODEL=${GEMINI_EMBED_MODEL:-gemini-embedding-2}
      - EMBED_DIM=${EMBED_DIM:-384}
      - EMBED_BATCH_SIZE=${EMBED_BATCH_SIZE:-100}
      - EMBED_MAX_RETRIES=${EMBED_MAX_RETRIES:-4}
      - EMBED_RETRY_BASE_SECONDS=${EMBED_RETRY_BASE_SECONDS:-1}
      - EMBED_RETRY_MAX_SECONDS=${EMBED_RETRY_MAX_SECONDS:-60}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-AI Platform <onboarding@resend.dev>}
      - ADZUNA_APP_ID=${ADZUNA_APP_ID:-}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY:-}
      - REED_API_KEY=${REED_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-}
      - DATABASE_SCHEMA=${DATABASE_SCHEMA:-app_private}
      - DATABASE_SSLMODE=${DATABASE_SSLMODE:-prefer}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_STORAGE_URI=${RATE_LIMIT_STORAGE_URI:-redis://redis:6379}
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN:-}
      - AUTH_REQUIRED=${AUTH_REQUIRED:-false}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-http://127.0.0.1:3000}
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend/nextjs-app:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - API_INTERNAL_URL=http://api:5000
      - NEXT_PUBLIC_API_URL=
      - API_AUTH_TOKEN=${API_AUTH_TOKEN:-}
      - NEXT_PUBLIC_AUTH_REQUIRED=${AUTH_REQUIRED:-false}
    command: sh -c "npm ci && npm run dev"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
  frontend_node_modules:
