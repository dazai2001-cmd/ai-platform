services:
  api:
    build: .
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - REDIS_URL=redis://redis:6379
      - DEBUG=false
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - API_AUTH_TOKEN=${API_AUTH_TOKEN:-}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-}
      - OPENAI_COMPAT_MODELS=${OPENAI_COMPAT_MODELS:-}
      - OPENAI_COMPAT_TIMEOUT_SECONDS=${OPENAI_COMPAT_TIMEOUT_SECONDS:-180}
      - OPENAI_COMPAT_MIN_TOKENS=${OPENAI_COMPAT_MIN_TOKENS:-4096}
      - OPENAI_COMPAT_FALLBACK_MODEL=${OPENAI_COMPAT_FALLBACK_MODEL:-qwen3:8b}
      - OPENAI_COMPAT_COOLDOWN_SECONDS=${OPENAI_COMPAT_COOLDOWN_SECONDS:-300}
      - ADZUNA_APP_ID=${ADZUNA_APP_ID:-}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY:-}
      - REED_API_KEY=${REED_API_KEY:-}
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend/nextjs-app:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - API_INTERNAL_URL=http://api:5000
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:5000
      - NEXT_PUBLIC_API_TOKEN=${API_AUTH_TOKEN:-}
    command: sh -c "npm ci && npm run dev"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
  frontend_node_modules:
